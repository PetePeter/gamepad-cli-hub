<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:">
  <title>Gamepad CLI Hub</title>
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="../node_modules/@xterm/xterm/css/xterm.css">
</head>
<body>
  <div id="app" class="sidebar app-layout">
    <!-- Left panel: sessions/settings/controls -->
    <div class="panel-left" id="panelLeft">
      <!-- Custom Titlebar -->
      <header class="sidebar-header">
        <span class="sidebar-logo">🎮</span>
        <span class="sidebar-title">Gamepad Hub</span>
        <div class="sidebar-actions">
          <button class="sidebar-btn" id="openLogsBtn" title="Open Logs Folder">🐛</button>
          <button class="sidebar-btn" id="settingsBtn" title="Settings">⚙</button>
        </div>
      </header>

      <!-- Compact Status Strip -->
      <div class="status-strip">
        <span class="status-dot" id="gamepadDot"></span>
        <span class="status-text"><span id="gamepadCount">0</span> connected</span>
        <span class="profile-badge-compact">
          <span id="profileName">default</span>
        </span>
      </div>

      <!-- Main Content Area -->
      <main class="sidebar-content">
        <!-- Sessions Screen (default) -->
        <section id="screen-sessions" class="screen screen--active">
          <div id="sessionsSortBar"></div>
          <div class="sessions-list" id="sessionsList">
            <!-- Session cards rendered dynamically by sessions.ts -->
          </div>
          <div class="sessions-empty" id="sessionsEmpty" style="display:none">
            No active sessions
          </div>
          <div class="spawn-section">
            <h3 class="section-label">Quick Spawn</h3>
            <div class="spawn-grid" id="spawnGrid">
              <!-- Spawn buttons rendered dynamically by sessions.ts -->
            </div>
          </div>

        </section>

        <!-- Settings Screen (slide-over from right) -->
        <section id="screen-settings" class="screen">
          <div class="screen-header">
            <h2>Settings</h2>
            <button class="btn btn--secondary" id="settingsBackBtn">Back</button>
          </div>
          <div class="settings-content">
            <div class="settings-tabs" id="settingsTabs" role="tablist"></div>
            <div class="binding-action-bar" id="bindingActionBar"></div>
            <div class="bindings-display" id="bindingsDisplay"></div>
          </div>
        </section>

      </main>
    </div>

    <!-- Resize handle between panels -->
    <div class="panel-splitter" id="panelSplitter"></div>

    <!-- Right panel: terminal area (always visible; terminal content shown when sessions exist) -->
    <div class="panel-right" id="terminalArea">
      <div class="terminal-container" id="terminalContainer">
        <!-- xterm.js terminals rendered here -->
      </div>
    </div>

    <!-- Hidden status placeholders (updated by navigation.ts, read by settings status tab) -->
    <div style="display:none">
      <span id="statusGamepadConnected">No</span>
      <span id="statusLastButton">-</span>
      <span id="statusActiveSessions">0</span>
      <span id="statusTotalSessions">0</span>
      <div id="eventLog" class="event-log"></div>
    </div>

    <!-- Directory Picker Modal -->
    <div class="modal-overlay" id="dirPickerModal" aria-hidden="true" role="dialog" aria-label="Select working directory">
      <div class="modal">
        <div class="modal-header">
          <h3 class="modal-title">Select Directory</h3>
        </div>
        <div class="dir-picker-list" id="dirPickerList" role="listbox"></div>
        <div class="modal-footer">
          <button class="btn btn--secondary" id="dirPickerCancelBtn">Cancel (B)</button>
          <button class="btn btn--primary" id="dirPickerSelectBtn">Select (A)</button>
        </div>
      </div>
    </div>

    <!-- Binding Editor Modal (keep existing) -->
    <div class="modal-overlay" id="bindingEditorModal" aria-hidden="true" role="dialog" aria-label="Edit binding">
      <div class="modal">
        <div class="modal-header">
          <h3 class="modal-title" id="bindingEditorTitle">Edit Binding</h3>
        </div>
        <div class="binding-editor-form" id="bindingEditorForm"></div>
        <div class="modal-footer">
          <button class="btn btn--secondary" id="bindingEditorCancelBtn">Cancel (B)</button>
          <button class="btn btn--primary" id="bindingEditorSaveBtn">Save (A)</button>
        </div>
      </div>
    </div>

    <!-- Generic Form Modal (keep existing) -->
    <div class="modal-overlay" id="formModal" aria-hidden="true" role="dialog" aria-label="Form">
      <div class="modal">
        <div class="modal-header">
          <h3 class="modal-title" id="formModalTitle">Form</h3>
        </div>
        <div class="binding-editor-form" id="formModalFields"></div>
        <div class="modal-footer">
          <button class="btn btn--secondary" id="formModalCancelBtn">Cancel (B)</button>
          <button class="btn btn--primary" id="formModalSaveBtn">OK (A)</button>
        </div>
      </div>
    </div>

    <!-- Close Confirmation Modal -->
    <div class="modal-overlay" id="closeConfirmOverlay" aria-hidden="true" role="dialog" aria-label="Close session confirmation">
      <div class="modal close-confirm-modal">
        <div class="modal-header">
          <h3 class="modal-title">Close Session</h3>
        </div>
        <div class="close-confirm-body" id="closeConfirmBody">Close this session?</div>
        <div class="modal-footer">
          <button class="btn btn--secondary" id="closeConfirmCancelBtn">Cancel (B)</button>
          <button class="btn btn--danger" id="closeConfirmCloseBtn">Close (A)</button>
        </div>
      </div>
    </div>

    <!-- Context Menu -->
    <div class="modal-overlay" id="contextMenuOverlay" aria-hidden="true" role="menu" aria-label="Terminal context menu">
      <div class="context-menu" id="contextMenu">
        <div class="context-menu-item" data-action="copy" tabindex="-1">
          <span class="item-icon">📋</span><span class="item-text">Copy</span>
        </div>
        <div class="context-menu-item" data-action="paste" tabindex="-1">
          <span class="item-icon">📥</span><span class="item-text">Paste</span>
        </div>
        <div class="context-menu-item" data-action="new-session" tabindex="-1">
          <span class="item-icon">➕</span><span class="item-text">New Session</span>
        </div>
        <div class="context-menu-item" data-action="new-session-with-selection" tabindex="-1">
          <span class="item-icon">📋➕</span><span class="item-text">New Session with Selection</span>
        </div>
        <div class="context-menu-item" data-action="sequences" tabindex="-1">
          <span class="item-icon">⏩</span><span class="item-text">Prompts</span>
        </div>
        <div class="context-menu-item" data-action="drafts" tabindex="-1">
          <span class="item-icon">📝</span><span class="item-text">Drafts</span>
        </div>
        <div class="context-menu-item context-menu-item--cancel" data-action="cancel" tabindex="-1">
          <span class="item-text">Cancel</span>
        </div>
      </div>
    </div>

    <!-- Draft Submenu -->
    <div class="modal-overlay" id="draftSubmenuOverlay" aria-hidden="true" role="menu" aria-label="Draft prompts submenu">
      <div class="context-menu context-menu--centered" id="draftSubmenu">
        <!-- Items rendered dynamically -->
      </div>
    </div>

    <!-- Draft Action Picker (Apply/Edit/Delete) -->
    <div class="modal-overlay" id="draftActionOverlay" aria-hidden="true" role="menu" aria-label="Draft action picker">
      <div class="context-menu context-menu--centered" id="draftActionMenu">
        <!-- Items rendered dynamically -->
      </div>
    </div>

    <!-- Sequence Picker -->
    <div class="modal-overlay" id="sequencePickerOverlay" aria-hidden="true" role="menu" aria-label="Sequence picker">
      <div class="context-menu context-menu--centered" id="sequencePicker">
        <!-- Items rendered dynamically by sequence-picker.ts -->
      </div>
    </div>

    <!-- Quick Spawn CLI Type Picker -->
    <div class="modal-overlay" id="quickSpawnOverlay" aria-hidden="true" role="dialog" aria-label="Quick spawn CLI type picker">
      <div class="modal">
        <div class="modal-title">Select CLI type</div>
        <div class="dir-picker-list" id="quickSpawnList">
          <!-- Items rendered dynamically by quick-spawn.ts -->
        </div>
        <div class="modal-footer">
          <button class="btn btn--secondary" id="quickSpawnCancelBtn">Cancel (B)</button>
        </div>
      </div>
    </div>

  </div>

  <script src="../dist/renderer/main.js" type="module"></script>
</body>
</html>
