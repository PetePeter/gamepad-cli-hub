<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:">
  <title>Helm — steer your fleet of agents</title>
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="../node_modules/@xterm/xterm/css/xterm.css">
</head>
<body>
  <div id="splashScreen" class="splash-screen" role="status" aria-live="polite">
    <div class="splash-screen__card">
      <img
        class="splash-screen__logo"
        src="assets/helm-paper-boat.svg"
        alt="Helm paper boat logo"
        width="112"
        height="112"
      >
      <p class="splash-screen__eyebrow">Launching Helm</p>
      <h1 class="splash-screen__title">Helm</h1>
      <p class="splash-screen__tagline">steer your fleet of agents</p>
      <p class="splash-screen__version" id="splashVersion"></p>
    </div>
  </div>

  <!-- Vue mounts here — App.vue renders the full layout -->
  <div id="app"></div>

  <script src="./vue-main.ts" type="module"></script>
</body>
</html>
