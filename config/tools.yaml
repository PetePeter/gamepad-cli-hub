openwhisper:
  whisperPath: whisper.exe
  model: models/ggml-base.en.bin
  language: en
cliTypes:
  claude-code:
    name: Claude Code
    spawn:
      command: wt
      args:
        - -w
        - "0"
        - claude
  copilot-cli:
    name: GitHub Copilot CLI
    spawn:
      command: wt
      args:
        - -w
        - "0"
        - cmd
        - /k
        - copilot
  generic-terminal:
    name: Generic Terminal
    spawn:
      command: wt
      args:
        - -w
        - "0"
