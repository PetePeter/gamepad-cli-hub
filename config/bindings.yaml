# Gamepad CLI Hub - Button Bindings Configuration
# Each CLI type has its own button mappings

# OpenWhisper configuration for local transcription
# Provides offline speech-to-text using whisper.cpp CLI
openwhisper:
  whisperPath: "whisper.exe"  # Path to whisper.cpp CLI
  model: "models/ggml-base.en.bin"  # Path to model file
  language: "en"  # Language code or "auto" for auto-detect
  # tempDir: "/tmp/gamepad-voice"  # Optional: custom temp directory

cliTypes:
  claude-code:
    name: "Claude Code"
    # How to spawn a new instance
    spawn:
      command: "wt"  # Windows Terminal
      args: ["-w", "0", "cc"]  # new window, run cc
    # Button mappings
    bindings:
      A:
        action: "keyboard"
        keys: ["Clear"]  # Send Clear/screen reset
      B:
        # Use "voice" for Claude Code's built-in voice (long-press spacebar)
        # Use "openwhisper" for local transcription with OpenWhisper
        action: "openwhisper"
        recordingDuration: 5000  # ms - max recording length
      X:
        action: "keyboard"
        keys: ["/", "h", "e", "l", "p", "Enter"]
      Y:
        action: "keyboard"
        keys: ["/", "s", "t", "a", "t", "u", "s", "Enter"]

  copilot-cli:
    name: "GitHub Copilot CLI"
    spawn:
      command: "wt"
      args: ["-w", "0", "gh", "copilot"]
    bindings:
      A:
        action: "keyboard"
        keys: ["Clear"]
      B:
        action: "keyboard"
        keys: ["Escape"]  # Cancel current
      X:
        action: "keyboard"
        keys: ["?", "Enter"]
      Y:
        action: "keyboard"
        keys: ["Ctrl", "c"]

  generic-terminal:
    name: "Generic Terminal"
    spawn:
      command: "wt"
      args: ["-w", "0"]
    bindings:
      A:
        action: "keyboard"
        keys: ["Clear"]
      B:
        action: "keyboard"
        keys: ["Ctrl", "c"]

# Global mappings (work regardless of active session)
global:
  # D-Pad Up: Switch to previous session
  Up:
    action: "session-switch"
    direction: "previous"
  # D-Pad Down: Switch to next session
  Down:
    action: "session-switch"
    direction: "next"
  # Left Trigger: Spawn new Claude Code
  LeftTrigger:
    action: "spawn"
    cliType: "claude-code"
  # Right Bumper: Spawn new Copilot CLI
  RightBumper:
    action: "spawn"
    cliType: "copilot-cli"
  # Start Button: List all sessions
  Start:
    action: "list-sessions"
