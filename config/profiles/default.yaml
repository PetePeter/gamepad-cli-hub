name: Default
tools:
  claude-code:
    name: claudecode
    spawnCommand: claude --session-id {cliSessionName}
    resumeCommand: claude --resume={cliSessionName}
    continueCommand: claude --continue
    handoffCommand: go implement it
    initialPromptDelay: 5000
    initialPrompt:
      - label: ""
        sequence: Call session_info to get helm MCP AIAGENT state registry, then output
          AIAGENT state as first line of each response.{Enter}
    sequences:
      prompts:
        - label: commit
          sequence: use skill(commit)
    pasteMode: pty
    patterns:
      # Rate limit: immediate cancel and retry
      - regex: rate limit
        action: send-text
        sequence: "{Ctrl+c}retry{Enter}"
        cooldownMs: 60000
      # Too many requests: immediate cancel and retry
      - regex: too many requests
        action: send-text
        sequence: "{Ctrl+c}retry{Enter}"
        cooldownMs: 60000
      # Scheduled retry: "try again at 9pm" or "try again at 9:30pm"
      - regex: try again at (\d{1,2}(?::\d{2})?(?:am|pm))
        action: wait-until
        timeGroup: 1
        onResume: resume{Enter}
        cooldownMs: 300000
      # Usage limit: wait 1 hour before retry
      - regex: usage limit|quota exceeded|limit reached
        action: wait-until
        waitMs: 3600000
        onResume: "{Ctrl+c}retry{Enter}"
        cooldownMs: 300000
  copilot-cli:
    name: copilot-raw
    spawnCommand: copilot --resume={cliSessionName}
    resumeCommand: copilot --resume={cliSessionName}
    continueCommand: copilot --continue
    handoffCommand: go implement it
    initialPrompt:
      - label: ""
        sequence: /allow-all{Send}
      - label: ""
        sequence: "{Wait 3000}Call session_info to get helm MCP AIAGENT state registry,
          then output AIAGENT state as first line of each response.{Enter}"
    initialPromptDelay: 7000
    sequences:
      prompts:
        - label: commit
          sequence: use skill(commit)
    pasteMode: clippaste
    patterns:
      # Rate limit: immediate cancel and retry
      - regex: rate limit|rate-limit exceeded
        action: send-text
        sequence: "{Ctrl+c}retry{Enter}"
        cooldownMs: 60000
      # Scheduled retry: "try again at 9pm" or "try again at 9:30pm"
      - regex: try again (?:in \d+ minutes?|at (\d{1,2}(?::\d{2})?(?:am|pm)))
        action: wait-until
        timeGroup: 1
        onResume: retry{Enter}
        cooldownMs: 300000
      # No fallback waitMs - if no time parsed, rule skips (logs warning)
  codex:
    name: codex
    spawnCommand: codex --dangerously-bypass-approvals-and-sandbox
    handoffCommand: go implement it
    initialPrompt:
      - label: ""
        sequence: Call session_info to get helm MCP AIAGENT state registry, then output
          AIAGENT state as first line of each response.{Enter}
    initialPromptDelay: 1000
    pasteMode: pty
    sequences:
      prompts:
        - label: commit
          sequence: use skill(commit)
  cmd:
    name: cmd
    spawnCommand: cmd.exe
    initialPrompt: []
    initialPromptDelay: 2000
  opencode:
    name: opencode-glm+kimi
    spawnCommand: opencode
    initialPrompt:
      - label: ""
        sequence: Call session_info to get helm MCP AIAGENT state registry, then output
          AIAGENT state as first line of each response.{Enter}
    initialPromptDelay: 10000
    pasteMode: pty
    sequences:
      prompts:
        - label: commit
          sequence: use skill(commit)
  kimi-cc:
    name: Kimi + CC
    initialPrompt:
      - label: ""
        sequence: Call session_info to get helm MCP AIAGENT state registry, then output
          AIAGENT state as first line of each response.{Enter}
    initialPromptDelay: 5000
    env:
      - name: ANTHROPIC_BASE_URL
        value: https://api.moonshot.ai/anthropic
      - name: ANTHROPIC_AUTH_TOKEN
        value: sk-kimi-2MSQymvpOjxVWe2jvBmRPBSQZD6vGdHVjIJm5aNnsGsdPJT8ZAuVn9ENr93OQSuw
      - name: ANTHROPIC_MODEL
        value: kimi-k2.5
      - name: ANTHROPIC_SMALL_FAST_MODEL
        value: kimi-k2.5
      - name: CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC
        value: "1"
      - name: API_TIMEOUT_MS
        value: "600000"
    pasteMode: pty
    spawnCommand: claude --session-id {cliSessionName}
    resumeCommand: claude --resume={cliSessionName}
    continueCommand: claude --continue
  glm-cc:
    name: GLM + CC
    initialPrompt:
      - label: ""
        sequence: Call session_info to get helm MCP AIAGENT state registry, then output
          AIAGENT state as first line of each response.{Enter}
    initialPromptDelay: 5000
