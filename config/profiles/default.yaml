name: Default
tools:
  claude-code:
    name: claudecode
    spawnCommand: claude --session-id {cliSessionName}
    resumeCommand: claude --resume={cliSessionName}
    continueCommand: claude --continue
    handoffCommand: go implement it
    initialPromptDelay: 3000
    initialPrompt:
      - label: ""
        sequence: Call session_info to get helm MCP AIAGENT state registry, then output
          AIAGENT state as first line of each response.{Enter}
    sequences:
      prompts:
        - label: commit
          sequence: use skill(commit)
    pasteMode: pty
    submitSuffix: \rg
    helmInitialPrompt: false
  codex:
    name: codex
    spawnCommand: codex --dangerously-bypass-approvals-and-sandbox
    handoffCommand: go implement it
    submitSuffix: \n
    initialPrompt:
      - label: ""
        sequence: Call session_info to get helm MCP AIAGENT state registry, then output
          AIAGENT state as first line of each response.{Enter}
    initialPromptDelay: 1000
    pasteMode: pty
    sequences:
      prompts:
        - label: commit
          sequence: use skill(commit)
    helmInitialPrompt: false
  cmd:
    name: cmd
    spawnCommand: cmd.exe
    initialPrompt: []
    initialPromptDelay: 2000
    pasteMode: pty
    helmInitialPrompt: false
  glm-cc:
    name: GLM + CC
    initialPrompt:
      - label: ""
        sequence: Call session_info to get helm MCP AIAGENT state registry, then output
          AIAGENT state as first line of each response.{Enter}
    initialPromptDelay: 3000
    env:
      - name: ANTHROPIC_BASE_URL
        value: https://api.z.ai/api/anthropic
      - name: CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC
        value: "1"
      - name: CLAUDE_CODE_DISABLE_1M_CONTEXT
        value: "1"
      - name: ANTHROPIC_DEFAULT_HAIKU_MODEL
        value: GLM-5-Turbo
      - name: ANTHROPIC_DEFAULT_SONNET_MODEL
        value: GLM-5-Turbo
      - name: ANTHROPIC_DEFAULT_OPUS_MODEL
        value: GLM-5-Turbo
      - name: ANTHROPIC_AUTH_TOKEN
        value: 63475507ce704887a938565992f311ae.bpOp0K1tVuukEE9Q
    pasteMode: pty
    spawnCommand: claude --session-id {cliSessionName}
    resumeCommand: claude --resume={cliSessionName}
    continueCommand: claude --resume={cliSessionName}
workingDirectories:
  - name: Helm
    path: X:\coding\gamepad-cli-hub
  - name: HomeAssistant
    path: X:\homeassistant
  - name: stillhere
    path: X:\coding\stillhere
  - name: GrapeJourney
    path: X:\coding\Vitido
  - name: cyberfile
    path: X:\coding\CyberfileSystems
chipActions:
  - label: 💾 Save Plan
    sequence: 'Write exactly one JSON file into {inboxDir}/ and do not write it
      anywhere else. Name it <encodeURIComponent("{cwd}")>@<uuid-v4>.json. The
      JSON must contain: id (uuid-v4), dirPath ("{cwd}"), title (short,
      specific), description (a full detailed plan body, not a TLDR or one-line
      summary), status ("startable"), createdAt and updatedAt (Date.now()). In
      description, include concrete sections titled Objective, Context,
      Approach, Steps, and Acceptance Criteria, each with substantive content
      tailored to the task. Description must not be just a summary line. Output
      only the file contents needed for that single JSON plan item and save it
      in the inbox folder.{Enter}'
