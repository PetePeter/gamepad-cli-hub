name: Default
tools:
  claude-code:
    name: Claude Code
    command: claude
    spawnCommand: claude --session-id {cliSessionName}
    resumeCommand: claude --resume={cliSessionName}
    continueCommand: claude --continue
    handoffCommand: "go implement it\r"
    initialPromptDelay: 1000
    initialPrompt:
      - sequence: >-
          <application-prompt>

          SYSTEMPROMPT:

          First line of EVERY response MUST be exactly one AIAGENT state tag:

          - AIAGENT-PLANNING — researching, thinking, investigating -
          AIAGENT-IMPLEMENTING — writing code, making changes -
          AIAGENT-COMPLETED — done, ready for review - AIAGENT-IDLE — waiting
          for input

          Format: First line = "AIAGENT-STATE" only. Nothing else on that line.

          </application-prompt>
    sequences:
      prompts:
        - label: commit
          sequence: use skill(commit)
  copilot-cli:
    name: GitHub Copilot CLI
    command: copilot
    spawnCommand: copilot --resume={cliSessionName}
    resumeCommand: copilot --resume={cliSessionName}
    continueCommand: copilot --continue
    handoffCommand: "go implement it\r"
    initialPrompt:
      - sequence: /allow-all{Enter}
      - sequence: >-
          {Wait 3000}<application-prompt>

          SYSTEMPROMPT:

          First line of EVERY response MUST be exactly one AIAGENT state tag:

          - AIAGENT-PLANNING — researching, thinking, investigating -
          AIAGENT-IMPLEMENTING — writing code, making changes -
          AIAGENT-COMPLETED — done, ready for review - AIAGENT-IDLE — waiting
          for input

          Format: First line = "AIAGENT-STATE" only. Nothing else on that line.

          </application-prompt>
    initialPromptDelay: 5000
    sequences:
      prompts:
        - label: commit
          sequence: use skill(commit)
        - label: Initial propmt
          sequence: >-
            /allow-all{Enter}

            Always end your response with the ask question tool. Include
            multiple choice options and one free text entry field.
  cmd:
    name: cmd
    command: cmd.exe
    initialPrompt: []
    initialPromptDelay: 2000
workingDirectories:
  - name: Gamepad Hub
    path: X:\coding\gamepad-cli-hub
  - name: HomeAssistant
    path: X:\homeassistant
  - name: stillhere
    path: X:\coding\stillhere
bindings:
  claude-code:
    RightTrigger:
      action: voice
      key: F1
      mode: hold
    A:
      action: keyboard
      sequence: "{Enter}"
    RightStickDown:
      action: keyboard
      sequence: "{Down}"
    RightStickUp:
      action: keyboard
      sequence: "{Up}"
    B:
      action: keyboard
      sequence: "{Escape}"
    RightStickLeft:
      action: keyboard
      sequence: "{Backspace}"
    RightStickRight:
      action: keyboard
      sequence: "{Space}"
    X:
      action: keyboard
      sequence: /clear{Enter}
    Y:
      action: keyboard
      sequence: "/foundation:"
    LeftTrigger:
      action: voice
      key: F1
      mode: hold
    RightStick:
      action: keyboard
      sequence: "{Enter}"
    LeftStickDown:
      action: keyboard
      sequence: "{PageDown}"
    LeftStickUp:
      action: keyboard
      sequence: "{PageUp}"
    RightBumper:
      action: sequence-list
      sequenceGroup: prompts
  copilot-cli:
    RightTrigger:
      action: voice
      key: F1
      mode: hold
    A:
      action: keyboard
      sequence: "{Enter}"
    RightStickDown:
      action: keyboard
      sequence: "{Down}"
    RightStickUp:
      action: keyboard
      sequence: "{Up}"
    B:
      action: keyboard
      sequence: "{Escape}"
    RightStickLeft:
      action: keyboard
      sequence: "{Backspace}"
    RightStickRight:
      action: keyboard
      sequence: "{Space}"
    X:
      action: keyboard
      sequence: /clear{Enter}
    Y:
      action: keyboard
      sequence: "/foundation:"
    LeftTrigger:
      action: voice
      key: F1
      mode: hold
    RightStick:
      action: keyboard
      sequence: "{Enter}"
    LeftStickDown:
      action: keyboard
      sequence: "{PageDown}"
    LeftStickUp:
      action: keyboard
      sequence: "{PageUp}"
    RightBumper:
      action: sequence-list
      sequenceGroup: prompts
  generic-terminal:
    A:
      action: keyboard
      sequence: "{Ctrl+L}"
    B:
      action: keyboard
      sequence: "{Ctrl+C}"
    LeftBumper:
      action: keyboard
      sequence: as asd
  python:
    A:
      action: keyboard
      sequence: "{Enter}"
sticks:
  left:
    mode: cursor
    deadzone: 0.25
    repeatRate: 60
  right:
    mode: scroll
    deadzone: 0.25
    repeatRate: 60
