name: Default
tools:
  claude-code:
    name: Claude Code
    command: claude
    initialPromptDelay: 1000
    initialPrompt: |
      <application-prompt>
      SYSTEMPROMPT:
      - Include AIAGENT-IMPLEMENTING when actively coding.
      - Include AIAGENT-PLANNING when researching or thinking.
      - Include AIAGENT-IDLE when awaiting input or task complete.
      - End responses with an open ended question with a freetype entry field.
      </application-prompt>
  copilot-cli:
    name: GitHub Copilot CLI
    command: copilot
    initialPrompt: |-
      <application-prompt>
      SYSTEMPROMPT:
      - Include AIAGENT-IMPLEMENTING when actively coding.
      - Include AIAGENT-PLANNING when researching or thinking.
      - Include AIAGENT-IDLE when awaiting input or task complete.
      - End responses with an open ended question with a freetype entry field.
      </application-prompt>
    initialPromptDelay: 5000
  python:
    name: python
    command: python
    initialPromptDelay: 0
    initialPrompt: ""
workingDirectories:
  - name: Gamepad Hub
    path: X:\coding\gamepad-cli-hub
  - name: HomeAssistant
    path: X:\homeassistant
bindings:
  claude-code:
    RightTrigger:
      action: voice
      key: F1
      mode: hold
    A:
      action: keyboard
      sequence: "{Enter}"
    RightStickDown:
      action: keyboard
      sequence: "{Down}"
    RightStickUp:
      action: keyboard
      sequence: "{Up}"
    B:
      action: keyboard
      sequence: "{Escape}"
    RightStickLeft:
      action: keyboard
      sequence: "{Backspace}"
    RightStickRight:
      action: keyboard
      sequence: "{Space}"
    X:
      action: keyboard
      sequence: /clear{Enter}
    Y:
      action: keyboard
      sequence: "/foundation:"
  copilot-cli:
    RightTrigger:
      action: voice
      key: F1
      mode: hold
    A:
      action: keyboard
      sequence: "{Enter}"
    RightStickDown:
      action: keyboard
      sequence: "{Down}"
    RightStickUp:
      action: keyboard
      sequence: "{Up}"
    B:
      action: keyboard
      sequence: "{Escape}"
    RightStickLeft:
      action: keyboard
      sequence: "{Backspace}"
    RightStickRight:
      action: keyboard
      sequence: "{Space}"
    X:
      action: keyboard
      sequence: /clear{Enter}
    Y:
      action: keyboard
      sequence: "/foundation:"
  generic-terminal:
    A:
      action: keyboard
      sequence: "{Ctrl+L}"
    B:
      action: keyboard
      sequence: "{Ctrl+C}"
    LeftBumper:
      action: keyboard
      sequence: as asd
  python:
    A:
      action: keyboard
      sequence: "{Enter}"
sticks:
  left:
    mode: cursor
    deadzone: 0.25
    repeatRate: 100
  right:
    mode: scroll
    deadzone: 0.25
    repeatRate: 150
