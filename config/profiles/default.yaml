name: Default
tools:
  claude-code:
    name: claudecode
    command: claude
    spawnCommand: claude --session-id {cliSessionName}
    resumeCommand: claude --resume={cliSessionName}
    continueCommand: claude --continue
    handoffCommand: go implement it
    initialPromptDelay: 5000
    initialPrompt:
      - label: ""
        sequence: >-
          <application-prompt>

          SYSTEMPROMPT:

          First line of EVERY response MUST be exactly one AIAGENT state tag:

          - AIAGENT-PLANNING — researching, thinking, investigating -
          AIAGENT-IMPLEMENTING — writing code, making changes -
          AIAGENT-COMPLETED — done, ready for review - AIAGENT-IDLE — waiting
          for input

          Format: First line = "AIAGENT-STATE" only. Nothing else on that line.

          </application-prompt>
    sequences:
      prompts:
        - label: commit
          sequence: use skill(commit)
    pasteMode: pty
  copilot-cli:
    name: copilot-raw
    command: copilot
    spawnCommand: copilot --resume={cliSessionName}
    resumeCommand: copilot --resume={cliSessionName}
    continueCommand: copilot --continue
    handoffCommand: go implement it
    initialPrompt:
      - label: ""
        sequence: /allow-all{Send}
      - label: ""
        sequence: >-
          {Wait 3000}<application-prompt>

          SYSTEMPROMPT:

          First line of EVERY response MUST be exactly one AIAGENT state tag:

          - AIAGENT-PLANNING — researching, thinking, investigating -
          AIAGENT-IMPLEMENTING — writing code, making changes -
          AIAGENT-COMPLETED — done, ready for review - AIAGENT-IDLE — waiting
          for input

          Format: First line = "AIAGENT-STATE" only. Nothing else on that line.


          ALways end each response with an open ended question using the ask
          question tool, including a free text entry field

          </application-prompt>
    initialPromptDelay: 7000
    sequences:
      prompts:
        - label: commit
          sequence: use skill(commit)
    pasteMode: clippaste
  codex:
    name: codex
    command: codex
    args: --dangerously-bypass-approvals-and-sandbox
    handoffCommand: go implement it
    initialPrompt:
      - label: ""
        sequence: >-
          <application-prompt>

          SYSTEMPROMPT:

          First line of EVERY response MUST be exactly one AIAGENT state tag:

          - AIAGENT-PLANNING — researching, thinking, investigating -
          AIAGENT-IMPLEMENTING — writing code, making changes -
          AIAGENT-COMPLETED — done, ready for review - AIAGENT-IDLE — waiting
          for input

          Format: First line = "AIAGENT-STATE" only. Nothing else on that line.

          </application-prompt>
    initialPromptDelay: 1000
    pasteMode: pty
    sequences:
      prompts:
        - label: commit
          sequence: use skill(commit)
  cmd:
    name: cmd
    command: cmd.exe
    initialPrompt: []
    initialPromptDelay: 2000
  opencode:
    name: opencode-glm+kimi
    command: opencode
    initialPrompt:
      - label: ""
        sequence: >-
          <application-prompt>

          SYSTEMPROMPT:

          First line of EVERY response MUST be exactly one AIAGENT state tag:

          - AIAGENT-PLANNING — researching, thinking, investigating -
          AIAGENT-IMPLEMENTING — writing code, making changes -
          AIAGENT-COMPLETED — done, ready for review - AIAGENT-IDLE — waiting
          for input

          Format: First line = "AIAGENT-STATE" only. Nothing else on that line.

          </application-prompt>
    initialPromptDelay: 10000
    pasteMode: pty
    sequences:
      prompts:
        - label: commit
          sequence: use skill(commit)
workingDirectories:
  - name: Helm
    path: X:\coding\gamepad-cli-hub
  - name: HomeAssistant
    path: X:\homeassistant
  - name: stillhere
    path: X:\coding\stillhere
  - name: GrapeJourney
    path: X:\coding\Vitido
chipActions:
  - label: 💾 Save Plan
    sequence: 'Write exactly one JSON file into {inboxDir}/ and do not write it
      anywhere else. Name it <encodeURIComponent("{cwd}")>@<uuid-v4>.json. The
      JSON must contain: id (uuid-v4), dirPath ("{cwd}"), title (short,
      specific), description (a full detailed plan body, not a TLDR or one-line
      summary), status ("startable"), createdAt and updatedAt (Date.now()). In
      description, include concrete sections titled Objective, Context,
      Approach, Steps, and Acceptance Criteria, each with substantive content
      tailored to the task. Description must not be just a summary line. Output
      only the file contents needed for that single JSON plan item and save it
      in the inbox folder.{Enter}'
