name: Default
cliTypes:
  claude-code:
    RightTrigger:
      action: voice
      key: Ctrl+Alt
      mode: hold
    A:
      action: keyboard
      sequence: "{Enter}"
    RightStickDown:
      action: keyboard
      sequence: "{Down}"
    RightStickUp:
      action: keyboard
      sequence: "{Up}"
    B:
      action: keyboard
      sequence: "{Escape}"
  copilot-cli:
    A:
      action: keyboard
      sequence: "{Ctrl+L}"
    B:
      action: keyboard
      sequence: "{Escape}"
    X:
      action: keyboard
      sequence: "?{Enter}"
  generic-terminal:
    A:
      action: keyboard
      sequence: "{Ctrl+L}"
    B:
      action: keyboard
      sequence: "{Ctrl+C}"
    LeftBumper:
      action: keyboard
      sequence: "as asd"
  python:
    A:
      action: keyboard
      sequence: "{Enter}"
global: {}
sticks:
  left:
    mode: cursor
    deadzone: 0.25
    repeatRate: 100
  right:
    mode: scroll
    deadzone: 0.25
    repeatRate: 150
