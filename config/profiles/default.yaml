name: Default
cliTypes:
  claude-code:
    A:
      action: keyboard
      keys:
        - Clear
    B:
      action: voice
      keys:
        - space
      holdDuration: 3000
    X:
      action: keyboard
      keys:
        - /
        - h
        - e
        - l
        - p
        - Enter
    Y:
      action: keyboard
      keys:
        - /
        - s
        - t
        - a
        - t
        - u
        - s
        - Enter
  copilot-cli:
    A:
      action: keyboard
      keys:
        - Clear
    B:
      action: keyboard
      keys:
        - Escape
    X:
      action: keyboard
      keys:
        - "?"
        - Enter
    Y:
      action: keyboard
      keys:
        - Ctrl
        - c
  generic-terminal:
    A:
      action: keyboard
      keys:
        - Clear
    B:
      action: keyboard
      keys:
        - Ctrl
        - c
    LeftBumper:
      action: keyboard
      keys:
        - as asd
  python:
    A:
      action: keyboard
      keys:
        - Enter
global:
  Xbox:
    action: hub-focus
  Down:
    action: session-switch
    direction: next
  LeftTrigger:
    action: spawn
    cliType: claude-code
  Back:
    action: profile-switch
    direction: previous
  LeftBumper:
    action: session-switch
    direction: previous
  RightBumper:
    action: session-switch
    direction: next
  RightTrigger:
    action: spawn
    cliType: copilot-cli
