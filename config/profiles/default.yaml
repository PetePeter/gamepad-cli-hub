name: Default
cliTypes:
  claude-code:
    A:
      action: keyboard
      keys:
        - Clear
    B:
      action: hold-key
      keys:
        - space
      delay: 200
    X:
      action: keyboard
      keys:
        - /
        - h
        - e
        - l
        - p
        - Enter
    Y:
      action: keyboard
      keys:
        - /
        - s
        - t
        - a
        - t
        - u
        - s
        - Enter
  copilot-cli:
    A:
      action: keyboard
      keys:
        - Clear
    B:
      action: keyboard
      keys:
        - Escape
    X:
      action: keyboard
      keys:
        - "?"
        - Enter
    Y:
      action: keyboard
      keys:
        - Ctrl
        - c
  generic-terminal:
    A:
      action: keyboard
      keys:
        - Clear
    B:
      action: keyboard
      keys:
        - Ctrl
        - c
    LeftBumper:
      action: keyboard
      keys:
        - as asd
  python:
    A:
      action: keyboard
      keys:
        - Enter
global:
  Xbox:
    action: hub-focus
  Back:
    action: profile-switch
    direction: previous
  Start:
    action: profile-switch
    direction: next
sticks:
  left:
    mode: cursor
    deadzone: 0.25
    repeatRate: 100
  right:
    mode: scroll
    deadzone: 0.25
    repeatRate: 150
