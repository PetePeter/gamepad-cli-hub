name: Default
tools:
  claude-code:
    name: Claude Code
    command: claude
    initialPromptDelay: 1000
    initialPrompt:
      - label: System Prompt
        sequence: >-
          <application-prompt>

          SYSTEMPROMPT:

          First line of EVERY response MUST be exactly one AIAGENT state tag:

          - AIAGENT-PLANNING — researching, thinking, investigating -
          AIAGENT-IMPLEMENTING — writing code, making changes -
          AIAGENT-COMPLETED — done, ready for review - AIAGENT-IDLE — waiting
          for input

          Format: First line = "AIAGENT-STATE" only. Nothing else on that line.

          </application-prompt>
  copilot-cli:
    name: GitHub Copilot CLI
    command: copilot
    initialPrompt:
      - label: Allow All
        sequence: /allow-all{Enter}
      - label: System Prompt
        sequence: >-
          {Wait 3000}<application-prompt>

          SYSTEMPROMPT:

          First line of EVERY response MUST be exactly one AIAGENT state tag:

          - AIAGENT-PLANNING — researching, thinking, investigating -
          AIAGENT-IMPLEMENTING — writing code, making changes -
          AIAGENT-COMPLETED — done, ready for review - AIAGENT-IDLE — waiting
          for input

          Format: First line = "AIAGENT-STATE" only. Nothing else on that line.

          </application-prompt>
    initialPromptDelay: 5000
workingDirectories:
  - name: Gamepad Hub
    path: X:\coding\gamepad-cli-hub
  - name: HomeAssistant
    path: X:\homeassistant
  - name: stillhere
    path: X:\coding\stillhere
bindings:
  claude-code:
    RightTrigger:
      action: voice
      key: F1
      mode: hold
    A:
      action: keyboard
      sequence: "{Enter}"
    RightStickDown:
      action: keyboard
      sequence: "{Down}"
    RightStickUp:
      action: keyboard
      sequence: "{Up}"
    B:
      action: keyboard
      sequence: "{Escape}"
    RightStickLeft:
      action: keyboard
      sequence: "{Backspace}"
    RightStickRight:
      action: keyboard
      sequence: "{Space}"
    X:
      action: keyboard
      sequence: /clear{Enter}
    Y:
      action: keyboard
      sequence: "/foundation:"
    LeftTrigger:
      action: voice
      key: F1
      mode: hold
    RightStick:
      action: keyboard
      sequence: "{Enter}"
    LeftStickDown:
      action: keyboard
      sequence: "{PageDown}"
    LeftStickUp:
      action: keyboard
      sequence: "{PageUp}"
    RightBumper:
      action: sequence-list
      items:
        - label: commit
          sequence: use skill(commit)
  copilot-cli:
    RightTrigger:
      action: voice
      key: F1
      mode: hold
    A:
      action: keyboard
      sequence: "{Enter}"
    RightStickDown:
      action: keyboard
      sequence: "{Down}"
    RightStickUp:
      action: keyboard
      sequence: "{Up}"
    B:
      action: keyboard
      sequence: "{Escape}"
    RightStickLeft:
      action: keyboard
      sequence: "{Backspace}"
    RightStickRight:
      action: keyboard
      sequence: "{Space}"
    X:
      action: keyboard
      sequence: /clear{Enter}
    Y:
      action: keyboard
      sequence: "/foundation:"
    LeftTrigger:
      action: voice
      key: F1
      mode: hold
    RightStick:
      action: keyboard
      sequence: "{Enter}"
    LeftStickDown:
      action: keyboard
      sequence: "{PageDown}"
    LeftStickUp:
      action: keyboard
      sequence: "{PageUp}"
    RightBumper:
      action: sequence-list
      items:
        - label: commit
          sequence: use skill(commit)
  generic-terminal:
    A:
      action: keyboard
      sequence: "{Ctrl+L}"
    B:
      action: keyboard
      sequence: "{Ctrl+C}"
    LeftBumper:
      action: keyboard
      sequence: as asd
  python:
    A:
      action: keyboard
      sequence: "{Enter}"
sticks:
  left:
    mode: cursor
    deadzone: 0.25
    repeatRate: 60
  right:
    mode: scroll
    deadzone: 0.25
    repeatRate: 60
