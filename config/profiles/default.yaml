name: Default
cliTypes:
  claude-code:
    RightTrigger:
      action: keyboard
      keys:
        - Ctrl
        - Alt
      hold: true
      target: os
    A:
      action: keyboard
      keys: []
      sequence: "{Enter}"
    RightStickDown:
      action: keyboard
      keys: []
      sequence: "{Down}"
    RightStickUp:
      action: keyboard
      keys: []
      sequence: "{Up}"
    B:
      action: keyboard
      keys: []
      sequence: "{Escape}"
  copilot-cli:
    A:
      action: keyboard
      keys:
        - Clear
    B:
      action: keyboard
      keys:
        - Escape
    X:
      action: keyboard
      keys:
        - "?"
        - Enter
  generic-terminal:
    A:
      action: keyboard
      keys:
        - Clear
    B:
      action: keyboard
      keys:
        - Ctrl
        - c
    LeftBumper:
      action: keyboard
      keys:
        - as asd
  python:
    A:
      action: keyboard
      keys:
        - Enter
global: {}
sticks:
  left:
    mode: cursor
    deadzone: 0.25
    repeatRate: 100
  right:
    mode: scroll
    deadzone: 0.25
    repeatRate: 150
