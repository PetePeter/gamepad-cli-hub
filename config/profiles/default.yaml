name: Default
cliTypes:
  claude-code:
    RightTrigger:
      action: voice
      key: F1
      mode: hold
    A:
      action: keyboard
      sequence: "{Enter}"
    RightStickDown:
      action: keyboard
      sequence: "{Down}"
    RightStickUp:
      action: keyboard
      sequence: "{Up}"
    B:
      action: keyboard
      sequence: "{Escape}"
    RightStickLeft:
      action: keyboard
      sequence: "{Backspace}"
    RightStickRight:
      action: keyboard
      sequence: "{Space}"
  copilot-cli:
    A:
      action: keyboard
      sequence: "{Enter}"
    B:
      action: keyboard
      sequence: "{Escape}"
    RightTrigger:
      action: voice
      key: F1
      mode: hold
  generic-terminal:
    A:
      action: keyboard
      sequence: "{Ctrl+L}"
    B:
      action: keyboard
      sequence: "{Ctrl+C}"
    LeftBumper:
      action: keyboard
      sequence: as asd
  python:
    A:
      action: keyboard
      sequence: "{Enter}"
global: {}
sticks:
  left:
    mode: cursor
    deadzone: 0.25
    repeatRate: 100
  right:
    mode: scroll
    deadzone: 0.25
    repeatRate: 150
