name: test
tools:
  claude-code:
    name: Claude Code
    command: claude
    initialPromptDelay: 1000
    initialPrompt: |
      <application-prompt>
      SYSTEMPROMPT:
      - Include AIAGENT-IMPLEMENTING when actively coding.
      - Include AIAGENT-PLANNING when researching or thinking.
      - Include AIAGENT-IDLE when awaiting input or task complete.
      - End responses with an open ended question with a freetype entry field.
      </application-prompt>
  copilot-cli:
    name: GitHub Copilot CLI
    command: copilot
    initialPrompt: |-
      <application-prompt>
      SYSTEMPROMPT:
      - Include AIAGENT-IMPLEMENTING when actively coding.
      - Include AIAGENT-PLANNING when researching or thinking.
      - Include AIAGENT-IDLE when awaiting input or task complete.
      - End responses with an open ended question with a freetype entry field.
      </application-prompt>
    initialPromptDelay: 5000
  python:
    name: python
    command: python
    initialPromptDelay: 0
    initialPrompt: ""
workingDirectories:
  - name: Gamepad Hub
    path: X:\coding\gamepad-cli-hub
  - name: HomeAssistant
    path: X:\homeassistant
bindings:
  claude-code: {}
  copilot-cli: {}
  python: {}
