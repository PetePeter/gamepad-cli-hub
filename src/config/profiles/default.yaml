name: Default
tools: {}
workingDirectories: []
chipActions:
  - label: 💾 Save Plan
    sequence: 'Write exactly one JSON file into {inboxDir}/ and do not write it anywhere else. Name it <encodeURIComponent("{cwd}")>@<uuid-v4>.json. The JSON must contain: id (uuid-v4), dirPath ("{cwd}"), title (short, specific), description (a full detailed plan body, not a TLDR or one-line summary), status ("startable"), createdAt and updatedAt (Date.now()). In description, include concrete sections titled Objective, Context, Approach, Steps, and Acceptance Criteria, each with substantive content tailored to the task. Description must not be just a summary line. Output only the file contents needed for that single JSON plan item and save it in the inbox folder.{Enter}'
bindings: {}
stickConfig:
  left:
    mode: cursor
  right:
    mode: scroll
dpadConfig:
  mode: sessions
patterns: []
